name: Daily Wiki Sync

on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt
      - name: Sync wiki data
        run: cd pipeline && python sync_wiki.py
      - name: Commit data changes
        run: |
          git config user.name "GenshinGuide Bot"
          git config user.email "bot@buildguide.gg"
          git add pipeline/data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "auto: daily wiki data sync $(date +%Y-%m-%d)"
            git push
          fi
